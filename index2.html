<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>SAMS – Chambres</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:              #0a0d12;
    --surface:         #161b22;
    --border:          #2a3240;
    --border-bright:   #3d4a5c;
    --free-bg:         #161b22;
    --free-border:     #2a3240;
    --occ-bg:          #3d0a0a;
    --occ-border:      #c0392b;
    --occ-text:        #ff6b6b;
    --text:            #e6edf3;
    --muted:           #5a6a7a;
    --red:             #e53e3e;
    --corridor:        #07090d;
    --mono:            'JetBrains Mono', monospace;
    --font:            'Inter', sans-serif;
  }

  html, body {
    width: 1920px;
    height: 1080px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  /* ── FULL-PAGE GRID ── */
  .map {
    width: 1920px;
    height: 1080px;
    display: grid;
    /* col: left-block | corridor | right-block */
    grid-template-columns: 1fr 28px 1fr;
    /* row: top | corridor | bottom */
    grid-template-rows: 1fr 28px 1fr;
    padding: 28px;
    gap: 0;
  }

  /* Corridors */
  .cv { grid-column: 2; grid-row: 1 / 4; background: var(--corridor); }
  .ch1 { grid-column: 1; grid-row: 2; background: var(--corridor); }
  .ch2 { grid-column: 3; grid-row: 2; background: var(--corridor); }
  .cx  { grid-column: 2; grid-row: 2; background: var(--corridor); }

  /* Quadrants */
  .q { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .q1 { grid-column: 1; grid-row: 1; }
  .q2 { grid-column: 3; grid-row: 1; }
  .q3 { grid-column: 1; grid-row: 3; background: var(--corridor); } /* vide */
  .q4 { grid-column: 3; grid-row: 3; }

  .row { display: flex; gap: 14px; flex: 1; min-height: 0; }

  /* ── ROOM CARD ── */
  .room {
    flex: 1;
    background: var(--free-bg);
    border: 2px solid var(--free-border);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color .12s, background .12s, box-shadow .12s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .room:hover {
    border-color: var(--border-bright);
    background: #1c2330;
  }

  .room.occupied {
    background: var(--occ-bg);
    border-color: var(--occ-border);
    box-shadow: 0 0 24px rgba(192,57,43,.3);
  }

  .room.occupied:hover {
    background: #4d0d0d;
    border-color: #e53e3e;
  }

  .room-num {
    font-family: var(--mono);
    font-size: 64px;
    font-weight: 600;
    color: var(--muted);
    line-height: 1;
    transition: color .12s;
  }

  .room.occupied .room-num { color: var(--occ-text); }

  .room-status {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #2a3a4a;
    transition: color .12s;
  }

  .room.occupied .room-status { color: var(--occ-border); }

  /* occupied top bar */
  .room::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--occ-border);
    opacity: 0;
    transition: opacity .12s;
  }
  .room.occupied::before { opacity: 1; }

  /* ── 371 – 3 LITS ── */
  .room-371 {
    flex: 1;
    background: var(--free-bg);
    border: 2px solid var(--free-border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .r371-header {
    padding: 8px 18px;
    background: #111620;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-shrink: 0;
  }

  .r371-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--muted);
  }

  .r371-sub {
    font-size: 11px;
    color: #2a3a4a;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .beds {
    display: flex;
    flex: 1;
  }

  .bed {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    background: var(--free-bg);
    border-right: 1px solid var(--border);
    transition: background .12s;
    user-select: none;
  }

  .bed:last-child { border-right: none; }
  .bed:hover { background: #1c2330; }
  .bed.occupied { background: var(--occ-bg); }
  .bed.occupied:hover { background: #4d0d0d; }

  .bed-num {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 600;
    color: var(--muted);
    transition: color .12s;
  }

  .bed.occupied .bed-num { color: var(--occ-text); }

  .bed-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: #2a3a4a;
    transition: color .12s;
  }

  .bed.occupied .bed-label { color: var(--occ-border); }

  /* TRAITEMENT label */
  .label-traitement {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color .12s;
  }
  .room.occupied .label-traitement { color: var(--occ-text); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #1c2128;
    border: 1px solid #3d4a5c;
    color: var(--text);
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--mono);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s, transform .18s;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="map">

  <!-- ══ Q1 : haut-gauche — 371 (3 lits) + 369 + 370 ══ -->
  <div class="q q1">
    <!-- Rangée 1 : chambre 371 avec 3 lits -->
    <div class="row">
      <div class="room-371">
        <div class="r371-header">
          <span class="r371-num">371</span>
          <span class="r371-sub">3 lits</span>
        </div>
        <div class="beds">
          <div class="bed" id="bed-371-1" onclick="toggleBed('371-1')">
            <span class="bed-num">1</span>
            <span class="bed-label">Libre</span>
          </div>
          <div class="bed" id="bed-371-2" onclick="toggleBed('371-2')">
            <span class="bed-num">2</span>
            <span class="bed-label">Libre</span>
          </div>
          <div class="bed" id="bed-371-3" onclick="toggleBed('371-3')">
            <span class="bed-num">3</span>
            <span class="bed-label">Libre</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Rangée 2 : 369 + 370 -->
    <div class="row">
      <div class="room" id="room-369" onclick="toggleRoom('369')">
        <span class="room-num">369</span>
        <span class="room-status">Libre</span>
      </div>
      <div class="room" id="room-370" onclick="toggleRoom('370')">
        <span class="room-num">370</span>
        <span class="room-status">Libre</span>
      </div>
    </div>
  </div>

  <!-- Couloir vertical -->
  <div class="cv"></div>

  <!-- ══ Q2 : haut-droit — 372 pleine largeur + 373 + 374 ══ -->
  <div class="q q2">
    <!-- Rangée 1 : 372 seule -->
    <div class="row">
      <div class="room" id="room-372" onclick="toggleRoom('372')">
        <span class="room-num">372</span>
        <span class="room-status">Libre</span>
      </div>
    </div>
    <!-- Rangée 2 : 373 + 374 -->
    <div class="row">
      <div class="room" id="room-373" onclick="toggleRoom('373')">
        <span class="room-num">373</span>
        <span class="room-status">Libre</span>
      </div>
      <div class="room" id="room-374" onclick="toggleRoom('374')">
        <span class="room-num">374</span>
        <span class="room-status">Libre</span>
      </div>
    </div>
  </div>

  <!-- Couloirs horizontaux -->
  <div class="ch1"></div>
  <div class="cx"></div>
  <div class="ch2"></div>

  <!-- ══ Q3 : bas-gauche — vide ══ -->
  <div class="q3"></div>

  <!-- ══ Q4 : bas-droit — TRAITEMENT aligné avec 373/374 ══ -->
  <div class="q q4">
    <div class="row">
      <div class="room" id="room-traitement" onclick="toggleRoom('traitement')">
        <span class="label-traitement">Traitement</span>
        <span class="room-status">Libre</span>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://jjgwtnkmztghgvneurzb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqZ3d0bmttenRnaGd2bmV1cnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjM4MDksImV4cCI6MjA5NzczOTgwOX0.NY-GjgMGQ1l7oMNFbHWOEsceE_bWk-oe6HCcJzMu0Cc';

const ROOMS = ['369','370','372','373','374','traitement'];
const BEDS  = ['371-1','371-2','371-3'];
const ALL   = [...ROOMS, ...BEDS];

let state = {};
ALL.forEach(id => state[id] = false);

let sb = null;

// ── Render ──
function renderOne(id) {
  const occ = state[id];
  if (BEDS.includes(id)) {
    const el = document.getElementById('bed-' + id);
    if (!el) return;
    el.classList.toggle('occupied', occ);
    el.querySelector('.bed-label').textContent = occ ? 'Occupé' : 'Libre';
  } else {
    const el = document.getElementById('room-' + id);
    if (!el) return;
    el.classList.toggle('occupied', occ);
    const s = el.querySelector('.room-status');
    if (s) s.textContent = occ ? 'Occupé' : 'Libre';
  }
}

function renderAll() { ALL.forEach(renderOne); }

// ── Toggle ──
async function toggleRoom(id) {
  state[id] = !state[id];
  renderOne(id);
  showToast((state[id] ? '🔴 ' : '🟢 ') + label(id) + (state[id] ? ' — Occupé' : ' — Libre'));
  if (sb) await sb.from('sams_rooms').upsert({ room_id: id, occupied: state[id] }, { onConflict: 'room_id' });
}

async function toggleBed(id) { await toggleRoom(id); }

function label(id) {
  if (id.startsWith('371-')) return 'Chambre 371 – Lit ' + id.split('-')[1];
  if (id === 'traitement') return 'Salle Traitement';
  return 'Chambre ' + id;
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Supabase ──
async function fetchAll() {
  try {
    const { data } = await sb.from('sams_rooms').select('*');
    if (!data) return;
    let changed = false;
    data.forEach(r => {
      if (ALL.includes(r.room_id) && state[r.room_id] !== r.occupied) {
        state[r.room_id] = r.occupied;
        renderOne(r.room_id);
        changed = true;
      }
    });
  } catch(e) {}
}

async function init() {
  try {
    sb = supabase.createClient(SB_URL, SB_KEY);

    // Chargement initial
    await fetchAll();

    // Realtime (déclenche immédiatement si dispo)
    sb.channel('sams_rooms_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'sams_rooms' }, payload => {
        const { room_id, occupied } = payload.new || {};
        if (room_id && ALL.includes(room_id)) {
          state[room_id] = occupied;
          renderOne(room_id);
        }
      })
      .subscribe();

    // Polling 500ms en filet de sécurité
    setInterval(fetchAll, 500);

  } catch(e) {
    console.error('Supabase error:', e);
  }
}

init();
</script>
</body>
</html>
